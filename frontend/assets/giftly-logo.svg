<svg width="350" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cool gradient for text -->
    <linearGradient id="coolGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8E44AD;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#27AE60;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:1" />
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#34495E" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle for modern look -->
  <circle cx="175" cy="50" r="45" fill="url(#coolGradient)" opacity="0.1"/>

  <!-- Text with cool effects -->
  <text x="175" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="url(#coolGradient)" filter="url(#glow)">giftly</text>

  <!-- Subtle underline -->
  <line x1="125" y1="75" x2="225" y2="75" stroke="url(#coolGradient)" stroke-width="2" opacity="0.7"/>
</svg>
